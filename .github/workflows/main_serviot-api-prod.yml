name: Build and deploy Node.js project to Azure Function App - serviot-api-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./api
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload built function app
        uses: actions/upload-artifact@v4
        with:
          name: functionapp
          path: ./api

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download built function app
        uses: actions/download-artifact@v4
        with:
          name: functionapp
          path: ./api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8996167999AD4495B04D837E8F121D83 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4EABB93A09E94444AE8A8A5345735A5C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FC16FEBA62D449059257B30104405F4A }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'serviot-api-prod'
          slot-name: 'Production'
          package: './api'
